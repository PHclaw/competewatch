<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompeteWatch - 竞品监控</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            dark: '#0f0f0f',
            card: '#1a1a1a',
            border: '#2a2a2a'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
  </style>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
  <!-- Header -->
  <header class="border-b border-border bg-card/50 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <span class="text-xl font-bold">CompeteWatch</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-400" id="lastUpdate">最后更新: --</span>
        <button onclick="refreshAll()" class="px-4 py-2 bg-primary hover:bg-primary/80 rounded-lg text-sm font-medium transition">
          刷新全部
        </button>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div class="border-b border-border">
    <div class="max-w-7xl mx-auto px-4 flex gap-8">
      <button onclick="showTab('monitor')" id="tab-monitor" class="py-4 text-sm font-medium tab-active">
        监控列表
      </button>
      <button onclick="showTab('notifications')" id="tab-notifications" class="py-4 text-sm font-medium text-gray-400 hover:text-white">
        通知配置
      </button>
      <button onclick="showTab('trends')" id="tab-trends" class="py-4 text-sm font-medium text-gray-400 hover:text-white">
        价格趋势
      </button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Monitor Tab -->
    <div id="panel-monitor">
      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-card rounded-2xl p-6 border border-border">
          <div class="flex items-center justify-between mb-4">
            <span class="text-gray-400 text-sm">监控中的竞品</span>
            <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </div>
          </div>
          <div class="text-3xl font-bold" id="activeCount">0</div>
        </div>
        
        <div class="bg-card rounded-2xl p-6 border border-border">
          <div class="flex items-center justify-between mb-4">
            <span class="text-gray-400 text-sm">今日变化</span>
            <div class="w-10 h-10 rounded-xl bg-yellow-500/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
              </svg>
            </div>
          </div>
          <div class="text-3xl font-bold" id="changesCount">0</div>
        </div>
        
        <div class="bg-card rounded-2xl p-6 border border-border">
          <div class="flex items-center justify-between mb-4">
            <span class="text-gray-400 text-sm">总竞品数</span>
            <div class="w-10 h-10 rounded-xl bg-green-500/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
              </svg>
            </div>
          </div>
          <div class="text-3xl font-bold" id="totalCount">0</div>
        </div>
      </div>

      <!-- Add Form -->
      <div class="bg-card rounded-2xl p-6 border border-border mb-8">
        <h2 class="text-lg font-semibold mb-4">添加竞品监控</h2>
        <form id="addForm" class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <input type="text" id="compName" placeholder="竞品名称" required
            class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
          <input type="url" id="compUrl" placeholder="监控URL" required
            class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary md:col-span-2">
          <select id="compType" class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <option value="price">价格监控</option>
            <option value="changelog">更新日志</option>
            <option value="article">文章发布</option>
            <option value="seo">SEO排名</option>
          </select>
          <button type="submit" class="bg-primary hover:bg-primary/80 rounded-lg font-medium transition">
            添加监控
          </button>
        </form>
        <input type="text" id="compSelector" placeholder="CSS选择器（可选，如 .price）"
          class="mt-4 w-full bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
      </div>

      <!-- Competitors List -->
      <div class="bg-card rounded-2xl border border-border overflow-hidden">
        <div class="px-6 py-4 border-b border-border flex items-center justify-between">
          <h2 class="text-lg font-semibold">竞品列表</h2>
          <span class="text-sm text-gray-400" id="listCount">共 0 个</span>
        </div>
        <div id="competitorList" class="divide-y divide-border">
          <div class="p-8 text-center text-gray-500">暂无竞品，点击上方添加</div>
        </div>
      </div>

      <!-- Recent Changes -->
      <div class="bg-card rounded-2xl border border-border overflow-hidden mt-8">
        <div class="px-6 py-4 border-b border-border">
          <h2 class="text-lg font-semibold">最近变化</h2>
        </div>
        <div id="changesList" class="divide-y divide-border max-h-96 overflow-y-auto">
          <div class="p-8 text-center text-gray-500">暂无变化记录</div>
        </div>
      </div>
    </div>

    <!-- Notifications Tab -->
    <div id="panel-notifications" class="hidden">
      <div class="bg-card rounded-2xl p-6 border border-border mb-8">
        <h2 class="text-lg font-semibold mb-4">添加通知配置</h2>
        <form id="notifyForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" id="notifyName" placeholder="配置名称" required
            class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
          <select id="notifyType" onchange="toggleNotifyFields()"
            class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <option value="email">邮件通知</option>
            <option value="webhook">Webhook</option>
          </select>
          
          <!-- Email fields -->
          <div id="emailFields" class="col-span-full grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="smtpHost" placeholder="SMTP服务器 (如 smtp.qq.com)"
              class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <input type="number" id="smtpPort" placeholder="端口" value="587"
              class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <input type="text" id="smtpUser" placeholder="发件邮箱"
              class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <input type="password" id="smtpPass" placeholder="邮箱密码/授权码"
              class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
            <input type="text" id="emailTo" placeholder="收件邮箱（多个用逗号分隔）"
              class="bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary md:col-span-2">
          </div>
          
          <!-- Webhook fields -->
          <div id="webhookFields" class="hidden col-span-full">
            <input type="url" id="webhookUrl" placeholder="Webhook URL"
              class="w-full bg-dark border border-border rounded-lg px-4 py-3 focus:outline-none focus:border-primary">
          </div>
          
          <button type="submit" class="md:col-span-2 bg-primary hover:bg-primary/80 rounded-lg font-medium py-3 transition">
            保存配置
          </button>
        </form>
      </div>
      
      <div class="bg-card rounded-2xl border border-border overflow-hidden">
        <div class="px-6 py-4 border-b border-border">
          <h2 class="text-lg font-semibold">已配置的通知</h2>
        </div>
        <div id="notifyList" class="divide-y divide-border">
          <div class="p-8 text-center text-gray-500">暂无通知配置</div>
        </div>
      </div>
    </div>

    <!-- Trends Tab -->
    <div id="panel-trends" class="hidden">
      <div class="bg-card rounded-2xl p-6 border border-border mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">价格趋势</h2>
          <select id="trendSelect" onchange="loadTrend()"
            class="bg-dark border border-border rounded-lg px-4 py-2 focus:outline-none focus:border-primary min-w-48">
            <option value="">选择竞品</option>
          </select>
        </div>
        <div class="relative h-80">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-card border border-border px-6 py-3 rounded-xl opacity-0 transition-opacity pointer-events-none z-50">
    <span id="toastMsg"></span>
  </div>

  <!-- Trend Detail Modal -->
  <div id="trendModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
    <div class="bg-card rounded-2xl p-6 max-w-lg w-full mx-4 border border-border">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold" id="modalTitle">价格详情</h3>
        <button onclick="closeTrendModal()" class="text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API = '/api';
    let trendChart = null;

    // Tab switching
    function showTab(name) {
      ['monitor', 'notifications', 'trends'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== name);
        document.getElementById(`tab-${t}`).classList.toggle('tab-active', t === name);
        document.getElementById(`tab-${t}`).classList.toggle('text-gray-400', t !== name);
      });
      if (name === 'trends') loadTrendSelect();
      if (name === 'notifications') loadNotifications();
    }

    // Load dashboard
    async function loadDashboard() {
      try {
        const res = await fetch(`${API}/dashboard`);
        const data = await res.json();
        
        document.getElementById('totalCount').textContent = data.total_competitors;
        document.getElementById('activeCount').textContent = data.active_competitors;
        document.getElementById('changesCount').textContent = data.recent_changes;
        document.getElementById('lastUpdate').textContent = `最后更新: ${new Date().toLocaleTimeString()}`;
        
        if (data.changes && data.changes.length > 0) {
          const changesHtml = data.changes.map(c => `
            <div class="px-6 py-4 hover:bg-dark/50 transition cursor-pointer" onclick="showChangeDetail(${c.id})">
              <div class="flex items-center justify-between">
                <div>
                  <span class="font-medium text-primary">${c.competitor_name}</span>
                  <span class="text-gray-400 text-sm ml-2">${c.change_type}</span>
                </div>
                <span class="text-gray-500 text-sm">${new Date(c.detected_at).toLocaleString()}</span>
              </div>
            </div>
          `).join('');
          document.getElementById('changesList').innerHTML = changesHtml;
        }
      } catch (e) {
        console.error('Failed to load dashboard:', e);
      }
    }

    // Load competitors
    async function loadCompetitors() {
      try {
        const res = await fetch(`${API}/competitors`);
        const competitors = await res.json();
        
        document.getElementById('listCount').textContent = `共 ${competitors.length} 个`;
        
        if (competitors.length === 0) {
          document.getElementById('competitorList').innerHTML = `
            <div class="p-8 text-center text-gray-500">暂无竞品，点击上方添加</div>
          `;
          return;
        }
        
        const html = competitors.map(c => `
          <div class="px-6 py-4 hover:bg-dark/50 transition flex items-center justify-between group">
            <div class="flex items-center gap-4 flex-1 min-w-0">
              <div class="w-2 h-2 rounded-full ${c.is_active ? 'bg-green-500' : 'bg-gray-500'}"></div>
              <div class="min-w-0">
                <div class="font-medium truncate">${c.name}</div>
                <div class="text-sm text-gray-500 truncate">${c.url}</div>
              </div>
              <span class="text-xs px-2 py-1 rounded bg-primary/20 text-primary whitespace-nowrap">${c.monitor_type}</span>
              ${c.last_price ? `<span class="text-sm font-medium text-yellow-400">¥${c.last_price.toFixed(2)}</span>` : ''}
            </div>
            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition">
              <button onclick="checkOne(${c.id})" class="px-3 py-1 text-sm bg-primary/20 hover:bg-primary/40 rounded transition">检查</button>
              <button onclick="viewTrend(${c.id})" class="px-3 py-1 text-sm bg-blue-500/20 hover:bg-blue-500/40 rounded transition">趋势</button>
              <button onclick="toggleOne(${c.id})" class="px-3 py-1 text-sm ${c.is_active ? 'bg-yellow-500/20' : 'bg-green-500/20'} hover:opacity-80 rounded transition">
                ${c.is_active ? '暂停' : '启用'}
              </button>
              <button onclick="deleteOne(${c.id})" class="px-3 py-1 text-sm bg-red-500/20 hover:bg-red-500/40 rounded transition">删除</button>
            </div>
          </div>
        `).join('');
        
        document.getElementById('competitorList').innerHTML = html;
      } catch (e) {
        console.error('Failed to load competitors:', e);
      }
    }

    // Add competitor
    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('compName').value,
        url: document.getElementById('compUrl').value,
        monitor_type: document.getElementById('compType').value,
        selector: document.getElementById('compSelector').value || null
      };
      
      try {
        const res = await fetch(`${API}/competitors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          showToast('添加成功');
          document.getElementById('addForm').reset();
          loadCompetitors();
          loadDashboard();
        } else {
          showToast('添加失败');
        }
      } catch (e) {
        showToast('请求失败');
      }
    });

    // Check one
    async function checkOne(id) {
      try {
        await fetch(`${API}/competitors/${id}/check`, { method: 'POST' });
        showToast('已触发检查');
        setTimeout(() => { loadDashboard(); loadCompetitors(); }, 2000);
      } catch (e) {
        showToast('检查失败');
      }
    }

    // Toggle one
    async function toggleOne(id) {
      try {
        await fetch(`${API}/competitors/${id}/toggle`, { method: 'PATCH' });
        loadCompetitors();
        loadDashboard();
      } catch (e) {
        showToast('操作失败');
      }
    }

    // Delete one
    async function deleteOne(id) {
      if (!confirm('确定删除该竞品？')) return;
      
      try {
        await fetch(`${API}/competitors/${id}`, { method: 'DELETE' });
        showToast('已删除');
        loadCompetitors();
        loadDashboard();
      } catch (e) {
        showToast('删除失败');
      }
    }

    // View trend
    async function viewTrend(id) {
      showTab('trends');
      document.getElementById('trendSelect').value = id;
      loadTrend();
    }

    // Notification functions
    function toggleNotifyFields() {
      const type = document.getElementById('notifyType').value;
      document.getElementById('emailFields').classList.toggle('hidden', type !== 'email');
      document.getElementById('webhookFields').classList.toggle('hidden', type !== 'webhook');
    }

    async function loadNotifications() {
      try {
        const res = await fetch(`${API}/notifications`);
        const configs = await res.json();
        
        if (configs.length === 0) {
          document.getElementById('notifyList').innerHTML = `
            <div class="p-8 text-center text-gray-500">暂无通知配置</div>
          `;
          return;
        }
        
        const html = configs.map(c => `
          <div class="px-6 py-4 hover:bg-dark/50 transition flex items-center justify-between group">
            <div class="flex items-center gap-4">
              <div class="w-2 h-2 rounded-full ${c.is_active ? 'bg-green-500' : 'bg-gray-500'}"></div>
              <div>
                <div class="font-medium">${c.name}</div>
                <div class="text-sm text-gray-500">${c.notify_type === 'email' ? '邮件通知' : 'Webhook'}</div>
              </div>
            </div>
            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition">
              <button onclick="testNotify(${c.id})" class="px-3 py-1 text-sm bg-blue-500/20 hover:bg-blue-500/40 rounded transition">测试</button>
              <button onclick="toggleNotify(${c.id})" class="px-3 py-1 text-sm ${c.is_active ? 'bg-yellow-500/20' : 'bg-green-500/20'} rounded transition">
                ${c.is_active ? '禁用' : '启用'}
              </button>
              <button onclick="deleteNotify(${c.id})" class="px-3 py-1 text-sm bg-red-500/20 hover:bg-red-500/40 rounded transition">删除</button>
            </div>
          </div>
        `).join('');
        
        document.getElementById('notifyList').innerHTML = html;
      } catch (e) {
        console.error('Failed to load notifications:', e);
      }
    }

    document.getElementById('notifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const type = document.getElementById('notifyType').value;
      const data = {
        name: document.getElementById('notifyName').value,
        notify_type: type
      };
      
      if (type === 'email') {
        data.smtp_host = document.getElementById('smtpHost').value;
        data.smtp_port = parseInt(document.getElementById('smtpPort').value) || 587;
        data.smtp_user = document.getElementById('smtpUser').value;
        data.smtp_pass = document.getElementById('smtpPass').value;
        data.email_to = document.getElementById('emailTo').value;
      } else {
        data.webhook_url = document.getElementById('webhookUrl').value;
      }
      
      try {
        const res = await fetch(`${API}/notifications`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          showToast('配置已保存');
          document.getElementById('notifyForm').reset();
          loadNotifications();
        } else {
          showToast('保存失败');
        }
      } catch (e) {
        showToast('请求失败');
      }
    });

    async function toggleNotify(id) {
      await fetch(`${API}/notifications/${id}/toggle`, { method: 'PATCH' });
      loadNotifications();
    }

    async function deleteNotify(id) {
      if (!confirm('确定删除该配置？')) return;
      await fetch(`${API}/notifications/${id}`, { method: 'DELETE' });
      showToast('已删除');
      loadNotifications();
    }

    async function testNotify(id) {
      try {
        const res = await fetch(`${API}/notifications/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        const data = await res.json();
        showToast(data.success ? '测试通知已发送' : '发送失败');
      } catch (e) {
        showToast('测试失败');
      }
    }

    // Trend functions
    async function loadTrendSelect() {
      try {
        const res = await fetch(`${API}/competitors`);
        const competitors = await res.json();
        
        const select = document.getElementById('trendSelect');
        select.innerHTML = '<option value="">选择竞品</option>' + 
          competitors.filter(c => c.monitor_type === 'price').map(c => 
            `<option value="${c.id}">${c.name}</option>`
          ).join('');
      } catch (e) {
        console.error('Failed to load trend select:', e);
      }
    }

    async function loadTrend() {
      const id = document.getElementById('trendSelect').value;
      if (!id) return;
      
      try {
        const res = await fetch(`${API}/competitors/${id}/trend?days=30`);
        const data = await res.json();
        
        const ctx = document.getElementById('trendChart').getContext('2d');
        
        if (trendChart) trendChart.destroy();
        
        trendChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.points.map(p => p.date),
            datasets: [{
              label: data.competitor_name,
              data: data.points.map(p => p.price),
              borderColor: '#6366f1',
              backgroundColor: 'rgba(99, 102, 241, 0.1)',
              fill: true,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              x: { 
                grid: { color: '#2a2a2a' },
                ticks: { color: '#888' }
              },
              y: { 
                grid: { color: '#2a2a2a' },
                ticks: { color: '#888' }
              }
            }
          }
        });
      } catch (e) {
        console.error('Failed to load trend:', e);
      }
    }

    // Refresh all
    async function refreshAll() {
      showToast('正在刷新...');
      await Promise.all([loadCompetitors(), loadDashboard()]);
      showToast('刷新完成');
    }

    // Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // Show change detail
    async function showChangeDetail(id) {
      // TODO: Load change detail
    }

    // Init
    loadCompetitors();
    loadDashboard();
  </script>
</body>
</html>

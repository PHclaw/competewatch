version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=sqlite:///./data/competewatch.db
    restart: unless-stopped

  # Optional: PostgreSQL for production
